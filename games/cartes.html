<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقات تعليمية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, #fff7b8 0%, #ffd6e7 45%, #cdefff 100%);
    min-height: 100vh;
    margin: 0;
    padding: 0;
}


.page {
    width: min(1100px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 40px;
}

.cards-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 260px;
    height: 320px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    overflow: hidden;
    text-align: center;
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h2 {
    margin: 10px;
    color: #2c3e50;
}

.card ul {
    list-style: none;
    padding: 0 15px;
    font-size: 14px;
}

.card ul li {
    margin: 5px 0;
}
</style>
</head>
<body data-page="cartes">
<header class="site-header">
    <a class="logo-wrap" href="../index.html">
        <span class="logo-icon">🐾</span>
        <span class="logo-text" data-i18n="brand">مغامرو المستقبل</span>
    </a>

    <nav class="main-nav">
        <a href="../index.html" data-i18n="nav.welcome">Welcome</a>
        <a href="../aboutus.html" data-i18n="nav.about">About Us</a>
        <a href="../cources/index.html" data-i18n="nav.courses">Courses</a>
        <a href="../games/index.html" data-i18n="nav.games">Games</a>
    </nav>

    <label class="lang-switcher" for="lang-select">
        <span data-i18n="lang.label">اللغة</span>
        <select id="lang-select" aria-label="Language selector">
            <option value="en" data-i18n="lang.en">English</option>
            <option value="fr" data-i18n="lang.fr">Francais</option>
            <option value="ar" data-i18n="lang.ar">العربية</option>
        </select>
    </label>
</header>

<main class="page">
<div class="cards-wrap">
    <div class="card">
        <img src="assests/photo/dog.png" alt="dog">
        <h2>🐶 <span data-i18n="dogTitle">الكلب</span></h2>
        <ul>
            <li data-i18n="dog1">حيوان أليف</li>
            <li data-i18n="dog2">يعيش مع الإنسان</li>
            <li data-i18n="dog3">صديق وفي</li>
        </ul>
    </div>

    <div class="card">
        <img src="assests/photo/lion.jpeg" alt="lion">
        <h2>🦁 <span data-i18n="lionTitle">الأسد</span></h2>
        <ul>
            <li data-i18n="lion1">حيوان مفترس</li>
            <li data-i18n="lion2">يعيش في الغابة</li>
            <li data-i18n="lion3">ملك الغابة</li>
        </ul>
    </div>

    <div class="card">
        <img src="assests/photo/3in.jpeg" alt="eye">
        <h2>👁️ <span data-i18n="eyeTitle">العين</span></h2>
        <ul>
            <li data-i18n="eye1">حاسة البصر</li>
            <li data-i18n="eye2">نرى بها الأشياء</li>
            <li data-i18n="eye3">نميز الألوان</li>
        </ul>
    </div>
</div>
</main>

<script src="../standalone.js"></script>
<script>
standaloneI18n.apply();
standaloneI18n.setup();
</script>
</body>
</html>
