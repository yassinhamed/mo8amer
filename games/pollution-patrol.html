<!DOCTYPE html>

<style>
.patrol-stage {
  display: grid;
  gap: 18px;
  min-height: 680px;
}

.patrol-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.patrol-card {
  border: none;
  border-radius: 26px;
  padding: 18px 14px;
  min-height: 170px;
  background: linear-gradient(180deg, rgba(34, 117, 132, 0.96), rgba(24, 77, 100, 0.98));
  border: 4px solid rgba(155, 236, 231, 0.6);
  color: #f1fffc;
  display: grid;
  gap: 10px;
  justify-items: center;
  align-content: center;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 14px 28px rgba(17, 67, 87, 0.24);
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

.patrol-card:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 18px 34px rgba(17, 67, 87, 0.28);
}

.patrol-card.is-hit {
  background: linear-gradient(180deg, rgba(126, 219, 141, 0.98), rgba(49, 153, 91, 0.98));
  border-color: rgba(230, 255, 224, 0.8);
  color: #08371a;
}

.patrol-card.is-miss {
  background: linear-gradient(180deg, rgba(252, 190, 91, 0.98), rgba(221, 123, 24, 0.98));
  border-color: rgba(255, 238, 174, 0.82);
  color: #5b2900;
}

.patrol-card:disabled {
  cursor: default;
}

.patrol-icon {
  font-size: 3rem;
  line-height: 1;
}

.patrol-label {
  font-size: 1rem;
  font-weight: 900;
  line-height: 1.35;
}

.patrol-finish {
  justify-items: center;
  align-content: center;
  text-align: center;
}

.patrol-links {
  display: grid;
  gap: 12px;
  width: min(100%, 420px);
}

.patrol-links a,
.patrol-links button {
  text-decoration: none;
}

@media (max-width: 780px) {
  .patrol-stage {
    min-height: 520px;
  }

  .patrol-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .patrol-card {
    min-height: 150px;
  }
}
</style>
</head>
<body data-lesson="pollution" data-game="patrol">

let currentLang = getInitialLanguage();
let roundIndex = 0;
let score = 0;
let foundBadCards = 0;
let fullscreenHandler = null;

function normalizeLanguage(value) {
  return SUPPORTED_LANGS.includes(value) ? value : null;
}

function getInitialLanguage() {
  const fromUrl = normalizeLanguage(new URLSearchParams(window.location.search).get('lang'));
  const fromStorage = normalizeLanguage(localStorage.getItem(STORAGE_KEY));
  const selected = fromUrl || fromStorage || 'ar';
  localStorage.setItem(STORAGE_KEY, selected);
  return selected;
}

function ui(key) {
  const aliases = {
    'nav.welcome': 'navHome',
    'nav.about': 'navAbout',
    'nav.courses': 'navCourses',
    'nav.games': 'navGames',
    'lang.label': 'langLabel',
    'lang.en': 'langEn',
    'lang.fr': 'langFr',
    'lang.ar': 'langAr'
  };
  const resolvedKey = aliases[key] || key;
  return (TRANSLATIONS[currentLang] || TRANSLATIONS.en)[resolvedKey] || TRANSLATIONS.en[resolvedKey] || key;
}

function shuffled(list) {
  const clone = [...list];
  for (let index = clone.length - 1; index > 0; index -= 1) {
    const swapIndex = Math.floor(Math.random() * (index + 1));
    [clone[index], clone[swapIndex]] = [clone[swapIndex], clone[index]];
  }
  return clone;
}

function syncLinks() {
  document.querySelectorAll('a[href]').forEach((anchor) => {
    const rawHref = anchor.getAttribute('href');
    if (!rawHref || rawHref.startsWith('#')) return;
    const url = new URL(rawHref, window.location.href);
    if (url.origin !== window.location.origin) return;
    if (!url.pathname.endsWith('.html')) return;
    url.searchParams.set('lang', currentLang);
    anchor.href = url.toString();
  });
}

function applyChromeTranslations() {
  document.querySelectorAll('[data-i18n]').forEach((node) => {
    node.textContent = ui(node.dataset.i18n);
  });
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.title = ui('title');
  const langSelect = document.getElementById('lang-select');
  langSelect.value = currentLang;
  syncLinks();
}

function updateFullscreenButton() {
  const shell = document.querySelector('.motion-game-shell');
  const button = document.getElementById('fullscreen-toggle');
  if (!shell || !button) return;
  const active = document.fullscreenElement === shell;
  shell.classList.toggle('is-fullscreen', active);
  button.textContent = active ? ui('exitFullscreen') : ui('fullscreen');
}

function setupFullscreen() {
  const button = document.getElementById('fullscreen-toggle');
  const shell = document.querySelector('.motion-game-shell');
  if (!button || !shell) return;
  if (fullscreenHandler) {
    document.removeEventListener('fullscreenchange', fullscreenHandler);
  }
  fullscreenHandler = updateFullscreenButton;
  document.addEventListener('fullscreenchange', fullscreenHandler);
  button.addEventListener('click', async () => {
    if (document.fullscreenElement === shell) {
      await document.exitFullscreen();
    } else {
      await shell.requestFullscreen();
    }
  });
  updateFullscreenButton();
}

async function enterFullscreen() {
  const shell = document.querySelector('.motion-game-shell');
  if (!shell) return;
  try {
    await shell.requestFullscreen();
  } catch (error) {
    shell.classList.remove('is-fullscreen');
  }
}

function setStatus(message, success) {
  const status = document.getElementById('status');
  if (!status) return;
  status.textContent = message;
  status.className = `status motion-status${success ? ' success' : ''}`;
}

function renderPortal() {
  const page = document.getElementById('game-page');
  page.innerHTML = `
    <div class="motion-portal-card">
      <div class="motion-portal-glow" aria-hidden="true"></div>
      <div class="motion-portal-badge">${ui('portalBadge')}</div>
      <h2>${ui('portalTitle')}</h2>
      <p>${ui('portalText')}</p>
      <button class="motion-portal-button" id="start-patrol" type="button">${ui('start')}</button>
    </div>
  `;
  document.getElementById('start-patrol').addEventListener('click', async () => {
    roundIndex = 0;
    score = 0;
    renderRound();
    await enterFullscreen();
  });
}

function renderFinish() {
  const page = document.getElementById('game-page');
  page.innerHTML = `
    <div class="motion-game-shell question-box">
      <div class="motion-hud">
        <div class="motion-hud-pill">
          <span class="motion-hud-icon" aria-hidden="true">🌍</span>
          <span>${TOTAL_ROUNDS}</span>
        </div>
        <div class="motion-hud-title">${ui('title')}</div>
        <div class="motion-hud-pill">
          <span class="motion-hud-icon" aria-hidden="true">⭐</span>
          <span>${score}</span>
        </div>
      </div>
      <section class="motion-center-stage patrol-stage patrol-finish">
        <div class="motion-celebration is-visible">${ui('good')}</div>
        <div class="motion-prompt">${ui('finishTitle')}</div>
        <div class="status motion-status success">${ui('finishText')}</div>
        <div class="patrol-links">
          <button class="action-btn" id="play-again" type="button">${ui('playAgain')}</button>
          <button class="action-btn motion-fullscreen-btn" id="fullscreen-toggle" type="button">${ui('fullscreen')}</button>
          <a class="action-btn" href="../cources/pollutioncourse.html?lang=${currentLang}">${ui('backLesson')}</a>
        </div>
      </section>
    </div>
  `;
  const audio = new Audio('../assests/voice/clapping.wav');
  audio.play();
  document.getElementById('play-again').addEventListener('click', async () => {
    roundIndex = 0;
    score = 0;
    renderRound();
    await enterFullscreen();
  });
  setupFullscreen();
}

function renderRound() {
  const cards = shuffled(ROUND_CARDS[currentLang][roundIndex]);
  foundBadCards = 0;
  const totalBadCards = cards.filter((card) => card.bad).length;
  const page = document.getElementById('game-page');

  page.innerHTML = `
    <div class="motion-game-shell question-box">
      <div class="motion-hud">
        <div class="motion-hud-pill">
          <span class="motion-hud-icon" aria-hidden="true">🕒</span>
          <span>${roundIndex + 1}/${TOTAL_ROUNDS}</span>
        </div>
        <div class="motion-hud-title">${ui('title')}</div>
        <div class="motion-hud-pill">
          <span class="motion-hud-icon" aria-hidden="true">⭐</span>
          <span id="score-value">${score}</span>
        </div>
      </div>
      <section class="motion-stage-layout">
        <aside class="motion-panel">
          <h2>🌍 ${ui('sideTitle')}</h2>
          <p class="motion-panel-copy">${ui('sideText')}</p>
          <div class="motion-quiz-progress">${ui('round')} ${roundIndex + 1}</div>
        </aside>
        <section class="motion-center-stage patrol-stage">
          <div class="motion-celebration" id="celebration">${ui('good')}</div>
          <div class="motion-prompt">${ui('prompt')}</div>
          <div class="status motion-status" id="status"></div>
          <div class="patrol-grid">
            ${cards.map((card, index) => `
              <button class="patrol-card" type="button" data-index="${index}" data-bad="${card.bad}">
                <span class="patrol-icon" aria-hidden="true">${card.icon}</span>
                <span class="patrol-label">${card.label}</span>
              </button>
            `).join('')}
          </div>
          <div class="motion-actions">
            <button class="action-btn motion-fullscreen-btn" id="fullscreen-toggle" type="button">${ui('fullscreen')}</button>
          </div>
        </section>
      </section>
    </div>
  `;

  setupFullscreen();

  document.querySelectorAll('.patrol-card').forEach((button) => {
    button.addEventListener('click', () => {
      if (button.disabled) return;
      const isBad = button.dataset.bad === 'true';
      if (isBad) {
        button.disabled = true;
        button.classList.add('is-hit');
        foundBadCards += 1;
        score += 1;
        document.getElementById('score-value').textContent = score;
        setStatus(ui('good'), true);
        const celebration = document.getElementById('celebration');
        celebration.classList.add('is-visible');
        window.setTimeout(() => celebration.classList.remove('is-visible'), 800);
        if (foundBadCards === totalBadCards) {
          window.setTimeout(async () => {
            const wasFullscreen = !!document.fullscreenElement;
            if (wasFullscreen) await document.exitFullscreen();
            roundIndex += 1;
            if (roundIndex < TOTAL_ROUNDS) {
              renderRound();
              if (wasFullscreen) await enterFullscreen();
            } else {
              renderFinish();
              if (wasFullscreen) await enterFullscreen();
            }
          }, 700);
        }
      } else {
        button.classList.add('is-miss');
        setStatus(ui('tryAgain'), false);
        window.setTimeout(() => button.classList.remove('is-miss'), 700);
      }
    });
  });
}

document.getElementById('lang-select').addEventListener('change', (event) => {
  const next = event.target.value;
  if (!SUPPORTED_LANGS.includes(next)) return;
  currentLang = next;
  localStorage.setItem(STORAGE_KEY, next);
  applyChromeTranslations();
  renderPortal();
});

applyChromeTranslations();
renderPortal();
</script>
