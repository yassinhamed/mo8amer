<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صنّف الحيوانات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, #fff7b8 0%, #ffd6e7 45%, #cdefff 100%);
    text-align: center;
    margin: 0;
    padding: 0;
    min-height: 100vh;
}


.page {
    width: min(1100px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 40px;
    text-align: center;
}

h1 {
    color: #ff6b6b;
    font-size: 42px;
}

p {
    color: #4a4a7a;
    font-size: 20px;
    max-width: 760px;
    margin: 0 auto 24px;
    line-height: 1.7;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 30px;
}

.zone {
    width: 260px;
    min-height: 250px;
    background: rgba(255, 255, 255, 0.9);
    border: 3px dashed #6a8cff;
    border-radius: 20px;
    padding: 14px;
    box-shadow: 0 10px 24px rgba(106, 140, 255, 0.18);
}

.zone h3 {
    margin-bottom: 10px;
    color: #2c3e50;
    font-size: 24px;
}

.items {
    margin-top: 30px;
    min-height: 120px;
}

.mood-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 18px auto 8px;
    max-width: 460px;
}

.mood-face {
    font-size: 34px;
}

.mood-wrap input[type="range"] {
    width: 260px;
    accent-color: #47c98b;
}

.mood-text {
    color: #4a4a7a;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.item {
    display: inline-block;
    width: 88px;
    height: 88px;
    line-height: 88px;
    margin: 10px;
    background: linear-gradient(135deg, #6ecbff, #6a8cff);
    color: white;
    border-radius: 18px;
    cursor: grab;
    font-size: 48px;
    box-shadow: 0 10px 22px rgba(106, 140, 255, 0.24);
}

button {
    margin-top: 20px;
    padding: 12px 24px;
    border: none;
    background: linear-gradient(135deg, #7ee081, #47c98b);
    color: white;
    border-radius: 14px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
}

#result {
    font-size: 34px;
    margin-top: 20px;
    min-height: 44px;
    color: #ff6b6b;
}

.popup {
    position: fixed;
    inset: 0;
    background: rgba(44, 62, 80, 0.35);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.popup.show {
    display: flex;
}

.popup-card {
    background: #fffaf0;
    border-radius: 24px;
    padding: 28px 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    text-align: center;
}

.popup-card h2 {
    color: #ff6b6b;
    font-size: 30px;
    margin-bottom: 12px;
}

.popup-card p {
    margin-bottom: 18px;
    font-size: 20px;
}

.popup-card button {
    margin-top: 0;
}
</style>
</head>
<body data-page="pettable">
<header class="site-header">
    <a class="logo-wrap" href="../index.html">
        <span class="logo-icon">🐾</span>
        <span class="logo-text" data-i18n="brand">مغامرو المستقبل</span>
    </a>

    <nav class="main-nav">
        <a href="../index.html" data-i18n="nav.welcome">Welcome</a>
        <a href="../aboutus.html" data-i18n="nav.about">About Us</a>
        <a href="../cources/index.html" data-i18n="nav.courses">Courses</a>
        <a href="../games/index.html" data-i18n="nav.games">Games</a>
    </nav>

    <label class="lang-switcher" for="lang-select">
        <span data-i18n="lang.label">اللغة</span>
        <select id="lang-select" aria-label="Language selector">
            <option value="en" data-i18n="lang.en">English</option>
            <option value="fr" data-i18n="lang.fr">Francais</option>
            <option value="ar" data-i18n="lang.ar">العربية</option>
        </select>
    </label>
</header>

<main class="page">
    <h1 data-i18n="pageTitle">صنّف الحيوانات</h1>
    <p data-i18n="subtitle">اسحب كل حيوان إلى الجدول المناسب له.</p>
    <div class="mood-wrap">
        <span class="mood-face">😡</span>
        <input type="range" id="moodBar" min="0" max="100" value="50" disabled>
        <span class="mood-face">😄</span>
    </div>
    <div class="mood-text" id="moodText" data-i18n="moodStart">مؤشر السعادة: لنبدأ اللعب!</div>

    <div class="container">
        <div class="zone items" id="items" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3 data-i18n="boxTitle">صندوق الحيوانات</h3>
        </div>

        <div class="zone" id="petZone" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3 data-i18n="petTitle">حيوانات أليفة</h3>
        </div>

        <div class="zone" id="wildZone" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3 data-i18n="wildTitle">حيوانات برية</h3>
        </div>
    </div>

    <button id="check-btn" onclick="check()" data-i18n="checkBtn">تحقّق من الإجابة</button>
    <div id="result"></div>
</main>
<div class="popup" id="popup">
    <div class="popup-card">
        <h2 id="popupTitle"></h2>
        <p id="popupMessage"></p>
        <button onclick="closePopup()" data-i18n="popupOk">حسنًا</button>
    </div>
</div>

<script src="../standalone.js"></script>
<script>
const animals = [
    { id: 'dog', type: 'pet', emoji: '🐶' },
    { id: 'cat', type: 'pet', emoji: '🐱' },
    { id: 'rabbit', type: 'pet', emoji: '🐰' },
    { id: 'hamster', type: 'pet', emoji: '🐹' },
    { id: 'parrot', type: 'pet', emoji: '🦜' },
    { id: 'fish', type: 'pet', emoji: '🐠' },
    { id: 'lion', type: 'wild', emoji: '🦁' },
    { id: 'tiger', type: 'wild', emoji: '🐯' },
    { id: 'elephant', type: 'wild', emoji: '🐘' },
    { id: 'monkey', type: 'wild', emoji: '🐵' },
    { id: 'fox', type: 'wild', emoji: '🦊' },
    { id: 'bear', type: 'wild', emoji: '🐻' }
];

let moodValue = 50;

function shuffleAnimals(list) {
    const shuffled = [...list];
    for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function renderAnimals() {
    document.getElementById('items').innerHTML = `<h3 data-i18n="boxTitle">${standaloneI18n.t('boxTitle')}</h3>`;
    document.getElementById('petZone').innerHTML = `<h3 data-i18n="petTitle">${standaloneI18n.t('petTitle')}</h3>`;
    document.getElementById('wildZone').innerHTML = `<h3 data-i18n="wildTitle">${standaloneI18n.t('wildTitle')}</h3>`;

    const itemsZone = document.getElementById('items');
    const pets = shuffleAnimals(animals.filter((animal) => animal.type === 'pet')).slice(0, 3);
    const wildAnimals = shuffleAnimals(animals.filter((animal) => animal.type === 'wild')).slice(0, 3);
    const selectedAnimals = shuffleAnimals([...pets, ...wildAnimals]);

    selectedAnimals.forEach((animal) => {
        const item = document.createElement('div');
        item.className = 'item';
        item.draggable = true;
        item.id = animal.id;
        item.dataset.type = animal.type;
        item.textContent = animal.emoji;
        item.ondragstart = drag;
        itemsZone.appendChild(item);
    });
}

function updateMood(change, message) {
    moodValue = Math.max(0, Math.min(100, moodValue + change));
    document.getElementById('moodBar').value = moodValue;
    document.getElementById('moodText').innerText = message;
}

function getZoneType(zoneId) {
    if (zoneId === 'petZone') return 'pet';
    if (zoneId === 'wildZone') return 'wild';
    return 'box';
}

function showPopup(title, message) {
    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupMessage').innerText = message;
    document.getElementById('popup').classList.add('show');
}

function closePopup() {
    document.getElementById('popup').classList.remove('show');
}

function allowDrop(ev) {
    ev.preventDefault();
}

function drag(ev) {
    ev.dataTransfer.setData('text', ev.target.id);
}

function drop(ev) {
    ev.preventDefault();
    const id = ev.dataTransfer.getData('text');
    const element = document.getElementById(id);
    const zone = ev.target.closest('.zone');

    if (zone) {
        zone.appendChild(element);
        const expectedType = element.dataset.type;
        const droppedType = getZoneType(zone.id);

        if (droppedType === 'box') {
            updateMood(-5, standaloneI18n.t('returned'));
        } else if (expectedType === droppedType) {
            updateMood(15, standaloneI18n.t('correctMove'));
        } else {
            updateMood(-15, standaloneI18n.t('wrongMove'));
        }
    }
}

function check() {
    let correct = true;
    const defaultZone = document.getElementById('items');

    document.querySelectorAll('.item').forEach((item) => {
        const parent = item.parentElement.id;
        const type = item.dataset.type;

        if ((type === 'pet' && parent !== 'petZone') || (type === 'wild' && parent !== 'wildZone')) {
            correct = false;
            item.style.background = '#ff6b6b';
            defaultZone.appendChild(item);
        } else {
            item.style.background = '#47c98b';
        }
    });

    const result = document.getElementById('result');

    if (correct) {
        const message = standaloneI18n.t('successMessage');
        result.innerText = message;
        showPopup(standaloneI18n.t('successTitle'), message);
    } else {
        const message = standaloneI18n.t('retryMessage');
        result.innerText = message;
        showPopup(standaloneI18n.t('retryTitle'), message);
        setTimeout(() => {
            document.querySelectorAll('.item').forEach((item) => {
                item.style.background = '';
            });
        }, 500);
    }
}

function resetPetTable() {
    moodValue = 50;
    document.getElementById('moodBar').value = 50;
    document.getElementById('moodText').innerText = standaloneI18n.t('moodStart');
    document.getElementById('result').innerText = '';
    closePopup();
    renderAnimals();
}

standaloneI18n.apply();
standaloneI18n.setup(() => {
    resetPetTable();
});
resetPetTable();
</script>
</body>
</html>
